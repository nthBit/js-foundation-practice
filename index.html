<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

</head>
<body>

    <script>
        // how to print to console
        console.log("Hello, world!")

        // how to declare a variable
        let firstName = "John";
        let lastName = "Doe";

        console.log(firstName);
        console.log(lastName);

        let age = 34;
        console.log(age);

        age = 35;
        console.log(age);

        // how to declare a constant
        const pi = 3.14;
        console.log(pi);

        // note that this throws an error
        // pi = 10;
        // console.log(pi);

        // testing maths in js
        console.log(23 + 97);
        console.log(20 + 63 + 98 + 1 + 7 + 304);
        console.log((4 + 6 + 9) / 77);

        let a = 10;
        console.log(a);
        a = 69;
        console.log(a);
        let b = 7 * a;
        console.log(b);

        const max = 57;
        const actual = max - 13;
        const percentage = actual / max;
        console.log(percentage);

    </script>
    
</body>
</html>
