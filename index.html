<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

</head>
<body>

    <script>

        // capitalize
        function capitalize(word) {
            let letterList = [];
            let wordLength = word.length;
            
            for (i = 0; i < wordLength; i++) {
                if (i === 0) {
                    letterList.push(word[i].toUpperCase());
                } else {
                    letterList.push(word[i].toLowerCase());
                }
            } 
            let finalWord = letterList.join("");
            return finalWord;
        }

        console.log(capitalize("gOOd"));

        // last letter
        function lastLetter(word) {
            let wordLength = word.length;
            return word[wordLength - 1];
        }

        console.log(lastLetter("Good"));

    </script>
    
</body>
</html>
